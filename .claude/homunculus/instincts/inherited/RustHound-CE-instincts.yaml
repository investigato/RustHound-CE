# RustHound CE Workflow Add Or Update Enum And Object Type

## Action

Follow the add-or-update-enum-and-object-type workflow:
1. Edit or add enum files in src/enums/ (such as acl.rs, ldaptype.rs, constants.rs, schema_guids.rs)
2. Edit or add object files in src/objects/ (such as user.rs, delegatedmsa.rs, attribute.rs)
3. Update related API logic in src/api.rs if needed

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/enums/acl.rs, src/enums/ldaptype.rs, src/enums/constants.rs

