# RustHound CE Workflow Cross Module Refactor Or Bugfix

## Action

Follow the cross-module-refactor-or-bugfix workflow:
1. Identify the cross-cutting concern (e.g., parsing bug, schema update, naming fix).
2. Update enums to reflect new or fixed values/types.
3. Modify parser modules to handle the new or corrected logic.
4. Update object definitions and related modules.
5. Adjust API layer if exposed externally.
6. Test changes across affected modules.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/enums/*.rs, src/json/parser/mod.rs, src/objects/*.rs

